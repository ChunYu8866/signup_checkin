<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#B3000E">
  <!-- CSP：僅允許同源資源；connect/frame 另放行 Apps Script 端點（fetch 會 302 轉往 script.googleusercontent.com）。 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self'; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-src https://script.google.com https://script.googleusercontent.com; object-src 'none'; base-uri 'none'; form-action 'none'">
  <meta name="referrer" content="no-referrer">
  <title>2026 下半年投資展望會｜活動報到</title>
  <link rel="stylesheet" href="./assets/css/app.css">
</head>
<body>
  <main class="shell" id="app">
    <header class="brand"><span aria-label="華南永昌證券">華南永昌證券</span></header>
    <section class="event-card" aria-labelledby="event-title">
      <p class="eyebrow">活動報到</p>
      <h1 id="event-title">2026 下半年投資展望會</h1>
      <dl class="event-meta">
        <div>
          <span class="meta-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/></svg></span>
          <dt>時間</dt><dd>2026/08/03（一）14:00</dd>
        </div>
        <div>
          <span class="meta-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16M6 20V6.8c0-.5.3-.9.8-1l5-1.6c.6-.2 1.2.3 1.2 1V20M13 9h4.2c.5 0 .8.4.8.9V20"/><path d="M8.5 9h1.5M8.5 12h1.5M8.5 15h1.5M16 12h.01M16 15h.01"/></svg></span>
          <dt>地點</dt><dd>華南銀行國際會議中心</dd>
        </div>
        <div>
          <span class="meta-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-6.5-5.3-6.5-10a6.5 6.5 0 1 1 13 0c0 4.7-6.5 10-6.5 10Z"/><circle cx="12" cy="10.6" r="2.3"/></svg></span>
          <dt>地址</dt><dd>台北市松仁路 123 號 2 樓</dd>
        </div>
      </dl>
      <a class="text-link" href="https://www.google.com/maps/search/?api=1&query=%E5%8F%B0%E5%8C%97%E5%B8%82%E6%9D%BE%E4%BB%81%E8%B7%AF123%E8%99%9F2%E6%A8%93" target="_blank" rel="noopener noreferrer">開啟地圖</a>
    </section>
    <section class="panel" data-screen="home">
      <h2>請選擇報到方式</h2>
      <button id="pre-registered" class="button button--primary" type="button">我有事先報名</button>
      <button id="walk-in" class="button button--secondary" type="button" disabled aria-describedby="walk-in-release-note">我要現場報名</button>
      <p id="walk-in-release-note" class="hint">現場報名將於個資蒐集告知核准後開放。</p>
    </section>
    <section id="screen-host" class="panel" aria-label="報到步驟" hidden></section>
    <div id="status" class="sr-only" role="status" aria-live="polite"></div>
    <footer class="page-foot">華南永昌綜合證券股份有限公司</footer>
  </main>
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      # 只壓縮「部署出去」的版本：repo 原始碼維持可讀，開發與測試不受影響。
      # 壓縮是為了載入速度與避免程式碼被輕易翻閱，不是安全機制（防護皆在後端）。
      - name: Minify deployed assets
        run: |
          npx --yes esbuild@0.25.0 web/assets/js/*.js --minify --target=es2020 --outdir=web/assets/js --allow-overwrite
          npx --yes esbuild@0.25.0 web/assets/css/app.css --minify --outfile=web/assets/css/app.css --allow-overwrite
          rm -f web/test-checkin.cjs
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true
      - name: Upload web artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./web
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
